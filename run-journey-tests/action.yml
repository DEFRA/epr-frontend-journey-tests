name: Run Journey Tests on GitHub
description: Run epr-frontend journey tests

inputs:
  epr-frontend:
    description: commit hash of epr-frontend
  branch:
    description: branch in this repo
    default: main
  journey-test-pr:
    description: is this action being called from a pr in this repo?
    default: 'false'
  feature-flag-closed-period-adjustments:
    description: >-
      Value of FEATURE_FLAG_CLOSED_PERIOD_ADJUSTMENTS for this run. The CI
      matrix runs the suite once per flag state. The value is dual-exported (see
      the first step below) to both the frontend container and the wdio runner,
      so the test view of the flag cannot drift from app behaviour.
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: Dual-export feature flags to container and runner
      shell: bash
      run: |
        # The one piece of plumbing the flags convention needs. Writing to
        # $GITHUB_ENV makes the flag visible to every later step in this job:
        # `docker compose up` interpolates it into the frontend container, and
        # `npm run test:github` reads it via process.env in test/support/flags.js.
        echo "FEATURE_FLAG_CLOSED_PERIOD_ADJUSTMENTS=${{ inputs.feature-flag-closed-period-adjustments }}" >> "$GITHUB_ENV"

    - name: Checkout repository if not called by Journey Test PR
      if: inputs.journey-test-pr == 'false'
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        repository: DEFRA/epr-frontend-journey-tests
        ref: ${{inputs.branch}}

    - name: Check for matching epr-frontend branch if it is Journey Test PR
      if: inputs.journey-test-pr != 'false'
      id: service-branch
      shell: bash
      run: |
        BRANCH="${{ github.head_ref }}"
        if git ls-remote --heads https://github.com/DEFRA/epr-frontend.git "$BRANCH" | grep -q .; then
          echo "ref=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "exists=true" >> $GITHUB_OUTPUT
        else
          echo "ref=main" >> "$GITHUB_OUTPUT"
          echo "exists=false" >> $GITHUB_OUTPUT
        fi

    - name: Checkout epr-frontend repository if it is Journey Test PR and there is a matching service branch
      if: inputs.journey-test-pr != 'false' && steps.service-branch.outputs.exists == 'true'
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        repository: DEFRA/epr-frontend
        ref: ${{steps.service-branch.outputs.ref}}
        path: epr-frontend

    - name: Build Docker image from epr-frontend if it is Journey Test PR and same branch exists
      if: inputs.journey-test-pr != 'false' && steps.service-branch.outputs.exists == 'true'
      id: docker-branch
      shell: bash
      run: |
        cd epr-frontend
        EPR_FRONTEND_SHA=$(git rev-parse --short HEAD)
        IMAGE_TAG="defradigital/epr-frontend:${EPR_FRONTEND_SHA}"
        docker build -t $IMAGE_TAG .
        echo "image=$EPR_FRONTEND_SHA" >> $GITHUB_OUTPUT

    - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
      with:
        node-version-file: .nvmrc
        cache: npm

    - name: Upgrade npm
      run: npm install -g npm@11.12.1
      shell: bash

    - name: Install
      run: npm ci
      shell: bash

    - name: Add hosts entry
      run: |
        sudo echo "127.0.0.1 defra-id-stub" | sudo tee -a /etc/hosts
        # Verify it worked
        cat /etc/hosts
      shell: bash

    - name: Check for matching epr-backend branch
      id: backend-branch
      shell: bash
      run: |
        BRANCH="${{ github.head_ref }}"
        if git ls-remote --heads https://github.com/DEFRA/epr-backend.git "$BRANCH" | grep -q .; then
          echo "ref=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "exists=true" >> "$GITHUB_OUTPUT"
          echo "::notice::Found matching epr-backend branch: $BRANCH — will build from source"
        else
          echo "exists=false" >> "$GITHUB_OUTPUT"
          echo "::notice::No matching epr-backend branch '$BRANCH' — using latest published image"
        fi

    - name: Checkout epr-backend repository if matching branch exists
      if: steps.backend-branch.outputs.exists == 'true'
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        repository: DEFRA/epr-backend
        ref: ${{ steps.backend-branch.outputs.ref }}
        path: epr-backend

    - name: Build Docker image from epr-backend matching branch
      if: steps.backend-branch.outputs.exists == 'true'
      id: docker-backend-branch
      shell: bash
      run: |
        cd epr-backend
        EPR_BACKEND_SHA=$(git rev-parse --short HEAD)
        IMAGE_TAG="defradigital/epr-backend:${EPR_BACKEND_SHA}"
        docker build -t $IMAGE_TAG .
        echo "image=$EPR_BACKEND_SHA" >> "$GITHUB_OUTPUT"

    - name: Start docker compose with matching Service Branch if it is Journey Test PR
      if: inputs.journey-test-pr != 'false' && steps.service-branch.outputs.exists == 'true'
      shell: bash
      run: |
        EPR_FRONTEND=${{ steps.docker-branch.outputs.image }} \
        EPR_BACKEND=${{ steps.docker-backend-branch.outputs.image }} \
        docker compose up --wait-timeout 300 -d --quiet-pull

    - name: Start docker compose
      if: steps.service-branch.outputs.exists != 'true'
      shell: bash
      run: |
        EPR_FRONTEND=${{ inputs.epr-frontend }} \
        EPR_BACKEND=${{ steps.docker-backend-branch.outputs.image }} \
        docker compose up --wait-timeout 300 -d --quiet-pull

    - name: Wait for services to be ready
      shell: bash
      run: |
        echo "Waiting for frontend to be ready..."
        timeout 180 bash -c 'until curl -f http://localhost:3000/health; do sleep 5; done'

    - name: Run the tests
      shell: bash
      run: |
        npm run test:github
        npm run report

    - name: debug
      if: always()
      run: |
        docker compose logs > logs.txt
        docker ps
      shell: bash

    - name: Upload allure report
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: allure-report
        path: ./allure-report

    - name: Upload docker compose logs
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: docker-compose-logs
        path: ./logs.txt

    - name: Fail this step if FAILED file exists
      if: always()
      run: |
        if [ -f "FAILED" ]; then
          exit 1
        fi
      shell: bash
