name: Check Pull Request

on:
  pull_request:
    branches:
      - '*'
    types:
      - opened
      - reopened
      - synchronize

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  pr-prep:
    name: Preparation
    runs-on: ubuntu-latest
    steps:
      - name: Prepare PR
        uses: DEFRA/epr-re-ex-service/.github/actions/pr-preparation@main

  pr-validator:
    name: Run Pull Request Checks
    runs-on: ubuntu-latest
    needs: pr-prep
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Test code and Create Test Coverage Reports
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm install -g npm@11.12.1
      - run: |
          npm ci --ignore-scripts
          npm run format:check
          npm run lint

  type-check:
    name: Lint Types (advisory)
    runs-on: ubuntu-latest
    needs: pr-prep
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Upgrade npm
        run: npm install -g npm@11.12.1

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Lint types
        run: |
          OUTPUT=$(npm run lint:types 2>&1) && STATUS=0 || STATUS=$?
          echo "$OUTPUT"

          ERRORS=$(echo "$OUTPUT" | grep -cE "^(test|docker)/" || true)

          {
            if [ "$STATUS" -eq 0 ]; then
              echo "## Lint Types"
              echo ""
              echo ":white_check_mark: Type check passed"
            else
              echo "## Lint Types"
              echo ""
              echo ":warning: **${ERRORS} type errors found** (advisory — not blocking)"
              echo ""
              echo "<details><summary>Errors by file</summary>"
              echo ""
              echo '```'
              echo "$OUTPUT" | grep -E "^(test|docker)/" | sed 's/(.*/:/' | sort | uniq -c | sort -rn
              echo '```'
              echo "</details>"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: pr-prep
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build .

  tests:
    name: Run Journey Tests
    runs-on: ubuntu-latest
    needs: pr-prep
    steps:
      - name: Checkout journey-tests repo
        uses: actions/checkout@v6

      - name: Run journey tests
        uses: ./run-journey-tests
        with:
          branch: ${{ github.head_ref }}
          journey-test-pr: true
