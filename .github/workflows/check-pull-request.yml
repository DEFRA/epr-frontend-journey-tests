name: Check Pull Request

on:
  pull_request:
    branches:
      - '*'
    types:
      - opened
      - reopened
      - synchronize

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  pr-prep:
    name: Preparation
    runs-on: ubuntu-latest
    steps:
      - name: Prepare PR
        uses: DEFRA/epr-re-ex-service/.github/actions/pr-preparation@main

  pr-validator:
    name: Run Pull Request Checks
    runs-on: ubuntu-latest
    needs: pr-prep
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Test code and Create Test Coverage Reports
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: |
          npm ci --ignore-scripts
          npm run format:check
          npm run lint

  type-check:
    name: Lint Types - Tests
    runs-on: ubuntu-latest
    needs: pr-prep
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: |
          npm ci --ignore-scripts
          npm run lint:types

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: pr-prep
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build Docker image
        run: docker build .

  tests:
    name: Run Journey Tests (closed-period adjustments=${{ matrix.closed-period-adjustments }})
    runs-on: ubuntu-latest
    needs: pr-prep
    # Run-twice matrix: the suite runs once per flag state so both the flag-off
    # and flag-on behaviours stay covered. See test/support/flags.js and the
    # README "Feature flags in journey tests". Both legs are blocking gates.
    strategy:
      fail-fast: false
      matrix:
        closed-period-adjustments: ['false', 'true']
    steps:
      - name: Checkout journey-tests repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run journey tests
        uses: ./run-journey-tests
        with:
          branch: ${{ github.head_ref }}
          journey-test-pr: true
          feature-flag-closed-period-adjustments: ${{ matrix.closed-period-adjustments }}
